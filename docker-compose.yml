services:

  # ── Backend Express ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: netfilm-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      # Uploads persistants (avatars, images)
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - netfilm

  # ── Frontend Vue 3 / Nginx ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: netfilm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - netfilm

volumes:
  uploads_data:

networks:
  netfilm:
    driver: bridge
